<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff8ec"/>
      <stop offset="0.48" stop-color="#f4e0c1"/>
      <stop offset="1" stop-color="#fff2dc"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.12" cy="0.06" r="0.85">
      <stop offset="0" stop-color="#d6a247" stop-opacity="0.38"/>
      <stop offset="0.42" stop-color="#d6a247" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#d6a247" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#7a4616" flood-opacity="0.16"/>
    </filter>
    <style>
      .serif { font-family: 'Songti SC','STSong','Noto Serif CJK SC','SimSun',serif; }
      .sans { font-family: 'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif; }
      .mono { font-family: 'SFMono-Regular','Menlo','Consolas',monospace; }
      .ink { fill:#211b16; }
      .muted { fill:#77685d; }
      .red { fill:#941f1f; }
      .green { fill:#255e46; }
      .gold { fill:#b37a27; }
      .white { fill:#fffaf1; }
      .small { font-size:25px; }
      .body { font-size:31px; }
      .label { font-size:24px; font-weight:700; letter-spacing:.04em; }
      .title { font-size:74px; font-weight:900; }
      .subtitle { font-size:32px; }
      .stepnum { font-size:34px; font-weight:900; fill:#fff8ec; }
      .step-title { font-size:35px; font-weight:900; }
      .step-copy { font-size:26px; }
      .field { font-size:24px; fill:#fff8ec; }
      .code { font-size:24px; fill:#fce7bf; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>
  <circle cx="1420" cy="120" r="170" fill="#941f1f" opacity="0.07"/>
  <circle cx="1510" cy="850" r="260" fill="#255e46" opacity="0.08"/>

  <g transform="translate(72 66)">
    <rect x="0" y="0" width="1456" height="868" rx="38" fill="#fffdf8" opacity="0.86" stroke="#ead7bd" stroke-width="2" filter="url(#shadow)"/>

    <g transform="translate(56 48)">
      <rect x="0" y="0" width="96" height="96" rx="20" fill="none" stroke="#941f1f" stroke-width="8"/>
      <text x="48" y="65" class="serif red" text-anchor="middle" font-size="48" font-weight="900">钥</text>
      <text x="124" y="28" class="sans label red">DEEPSEEK API KEY GUIDE</text>
      <text x="124" y="88" class="serif title ink">3分钟拿到 API Key，并填入法律工具</text>
      <text x="124" y="132" class="sans subtitle muted">面向中国律师 · BYOK：密钥由你自带，本系统不保存账号、案情或 API Key</text>
    </g>

    <g transform="translate(56 226)">
      <rect x="0" y="0" width="420" height="214" rx="28" fill="#fff6e6" stroke="#ead7bd" stroke-width="2"/>
      <circle cx="48" cy="48" r="30" fill="#941f1f"/><text x="48" y="59" class="sans stepnum" text-anchor="middle">1</text>
      <text x="92" y="54" class="sans step-title ink">打开官方平台</text>
      <text x="34" y="108" class="sans step-copy muted">访问 platform.deepseek.com</text>
      <text x="34" y="148" class="sans step-copy muted">注册或登录账号</text>
      <text x="34" y="188" class="sans step-copy green">只使用官方入口，避免钓鱼链接</text>

      <rect x="456" y="0" width="420" height="214" rx="28" fill="#fff6e6" stroke="#ead7bd" stroke-width="2"/>
      <circle cx="504" cy="48" r="30" fill="#941f1f"/><text x="504" y="59" class="sans stepnum" text-anchor="middle">2</text>
      <text x="548" y="54" class="sans step-title ink">进入 API Keys</text>
      <text x="490" y="108" class="sans step-copy muted">在控制台找到 API Keys</text>
      <text x="490" y="148" class="sans step-copy muted">必要时先完成充值/余额确认</text>
      <text x="490" y="188" class="sans step-copy green">API 与网页版聊天是两套入口</text>

      <rect x="912" y="0" width="420" height="214" rx="28" fill="#fff6e6" stroke="#ead7bd" stroke-width="2"/>
      <circle cx="960" cy="48" r="30" fill="#941f1f"/><text x="960" y="59" class="sans stepnum" text-anchor="middle">3</text>
      <text x="1004" y="54" class="sans step-title ink">新建并复制 Key</text>
      <text x="946" y="108" class="sans step-copy muted">点击 Create API Key</text>
      <text x="946" y="148" class="sans step-copy muted">复制 sk-...，只显示一次</text>
      <text x="946" y="188" class="sans step-copy green">像保管网银密码一样保管它</text>
    </g>

    <g transform="translate(56 480)">
      <rect x="0" y="0" width="694" height="270" rx="30" fill="#211b16" filter="url(#shadow)"/>
      <text x="36" y="56" class="sans step-title" fill="#fff8ec">4. 填入 Claude for Legal CN Online</text>
      <text x="38" y="104" class="sans field">Provider</text>
      <text x="190" y="104" class="mono code">DeepSeek</text>
      <text x="38" y="148" class="sans field">Base URL</text>
      <text x="190" y="148" class="mono code">https://api.deepseek.com/v1</text>
      <text x="38" y="188" class="sans field">Model</text>
      <text x="190" y="188" class="mono code">deepseek-v4-flash</text>
      <text x="190" y="222" class="mono code">或 deepseek-v4-pro</text>
      <text x="38" y="256" class="sans field">API Key</text>
      <text x="190" y="256" class="mono code">粘贴 sk-...，不要截图展示</text>

      <rect x="738" y="0" width="594" height="270" rx="30" fill="#fff6e6" stroke="#ead7bd" stroke-width="2"/>
      <circle cx="786" cy="48" r="30" fill="#941f1f"/><text x="786" y="59" class="sans stepnum" text-anchor="middle">5</text>
      <text x="830" y="56" class="sans step-title ink">选择技能并试用</text>
      <text x="774" y="111" class="sans step-copy muted">选择“演示模式”快速体验</text>
      <text x="774" y="153" class="sans step-copy muted">或切换“专家模式”搜索法律技能</text>
      <text x="774" y="195" class="sans step-copy muted">粘贴案情/合同/制度文本后生成草稿</text>
      <text x="774" y="237" class="sans step-copy green">所有输出均需合格律师复核</text>
    </g>

    <g transform="translate(56 786)">
      <rect x="0" y="0" width="1332" height="104" rx="26" fill="#f7ead7" stroke="#ead7bd" stroke-width="2"/>
      <text x="32" y="42" class="sans label red">安全提醒</text>
      <text x="32" y="78" class="sans small muted">不要把 API Key 发给同事、客户或截图；怀疑泄露时立即删除并重建。</text>
      <text x="1328" y="42" class="sans" font-size="20" fill="#9a8b7e" text-anchor="end">来源：DeepSeek API Docs，2026-05-15 查阅</text>
      <text x="1328" y="78" class="sans" font-size="23" fill="#77685d" text-anchor="end">调用失败：检查 Key、余额、模型名、Base URL</text>
    </g>
  </g>
</svg>

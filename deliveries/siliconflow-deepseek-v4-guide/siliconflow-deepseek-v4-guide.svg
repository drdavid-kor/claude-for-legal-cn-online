<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff8ec"/>
      <stop offset="0.50" stop-color="#f3dfbf"/>
      <stop offset="1" stop-color="#fff4e0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.1" cy="0.04" r="0.9">
      <stop offset="0" stop-color="#c8953f" stop-opacity="0.38"/>
      <stop offset="0.46" stop-color="#c8953f" stop-opacity="0.11"/>
      <stop offset="1" stop-color="#c8953f" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#6c3e13" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#9d1f1f"/>
    </marker>
    <style>
      .serif { font-family: 'Songti SC','STSong','Noto Serif CJK SC','SimSun',serif; }
      .sans { font-family: 'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif; }
      .mono { font-family: 'SFMono-Regular','Menlo','Consolas',monospace; }
      .ink { fill:#211b16; }
      .muted { fill:#73665d; }
      .red { fill:#9d1f1f; }
      .green { fill:#1f684b; }
      .gold { fill:#b37a27; }
      .paper { fill:#fffaf1; }
      .title { font-size:76px; font-weight:900; }
      .subtitle { font-size:32px; }
      .step-title { font-size:35px; font-weight:900; }
      .copy { font-size:27px; }
      .small { font-size:23px; }
      .field-label { font-size:31px; font-weight:900; }
      .field-value { font-size:32px; font-weight:800; }
      .button-text { font-size:30px; font-weight:900; }
      .badge-num { font-size:34px; font-weight:900; fill:#fff8ec; }
    </style>
  </defs>

  <rect width="1800" height="1100" fill="url(#bg)"/>
  <rect width="1800" height="1100" fill="url(#glow)"/>
  <circle cx="1600" cy="140" r="240" fill="#9d1f1f" opacity="0.06"/>
  <circle cx="1680" cy="940" r="310" fill="#1f684b" opacity="0.07"/>

  <g transform="translate(78 70)">
    <rect x="0" y="0" width="1644" height="960" rx="42" fill="#fffdf8" opacity="0.91" stroke="#ead7bd" stroke-width="2" filter="url(#shadow)"/>

    <g transform="translate(54 46)">
      <rect x="0" y="0" width="96" height="96" rx="20" fill="none" stroke="#9d1f1f" stroke-width="8"/>
      <text x="48" y="66" class="serif red" text-anchor="middle" font-size="48" font-weight="900">流</text>
      <text x="124" y="30" class="sans" font-size="27" fill="#9d1f1f" font-weight="900" letter-spacing="2">SILICONFLOW · DEEPSEEK V4</text>
      <text x="124" y="88" class="serif title ink">本所 API Key 填写指南</text>
      <text x="124" y="134" class="sans subtitle muted">使用统一提供的 SiliconFlow Key，体验 DeepSeek V4；Key 只保存在本标签页。</text>
    </g>

    <g transform="translate(56 226)">
      <rect x="0" y="0" width="596" height="660" rx="30" fill="#fff6e6" stroke="#ead7bd" stroke-width="2"/>
      <text x="36" y="62" class="serif" font-size="43" font-weight="900" fill="#211b16">照着 4 步填</text>
      <text x="36" y="105" class="sans copy muted">不要注册个人 Key；直接使用本所提供的 Key。</text>

      <g transform="translate(36 148)">
        <circle cx="30" cy="30" r="30" fill="#9d1f1f"/><text x="30" y="42" text-anchor="middle" class="sans badge-num">1</text>
        <text x="78" y="28" class="sans step-title ink">点击 SiliconFlow</text>
        <text x="78" y="68" class="sans copy muted">选择截图中的中间按钮。</text>
      </g>
      <g transform="translate(36 270)">
        <circle cx="30" cy="30" r="30" fill="#9d1f1f"/><text x="30" y="42" text-anchor="middle" class="sans badge-num">2</text>
        <text x="78" y="28" class="sans step-title ink">确认 Base URL</text>
        <text x="78" y="68" class="mono copy green">https://api.siliconflow.cn/v1</text>
      </g>
      <g transform="translate(36 392)">
        <circle cx="30" cy="30" r="30" fill="#9d1f1f"/><text x="30" y="42" text-anchor="middle" class="sans badge-num">3</text>
        <text x="78" y="28" class="sans step-title ink">填入 Model</text>
        <text x="78" y="68" class="mono copy green">deepseek-ai/DeepSeek-V4-Flash</text>
      </g>
      <g transform="translate(36 514)">
        <circle cx="30" cy="30" r="30" fill="#9d1f1f"/><text x="30" y="42" text-anchor="middle" class="sans badge-num">4</text>
        <text x="78" y="28" class="sans step-title ink">粘贴本所 API Key</text>
        <text x="78" y="68" class="sans copy muted">建议勾选“本标签页记住配置”。</text>
      </g>
    </g>

    <g transform="translate(704 226)">
      <rect x="0" y="0" width="878" height="660" rx="34" fill="#fffdf8" stroke="#ead7bd" stroke-width="2" filter="url(#shadow)"/>

      <g transform="translate(34 34)">
        <circle cx="34" cy="34" r="34" fill="#9d1f1f"/><text x="34" y="47" text-anchor="middle" class="sans badge-num">2</text>
        <text x="84" y="49" class="serif" font-size="52" font-weight="900" fill="#211b16">配置模型</text>
        <text x="84" y="96" class="serif subtitle muted">支持 OpenAI-compatible API。Key 默认只保存在内存。</text>
      </g>

      <g transform="translate(34 150)">
        <rect x="0" y="0" width="188" height="82" rx="41" fill="#fff0d7" stroke="#ead7bd" stroke-width="2"/>
        <text x="94" y="52" text-anchor="middle" class="sans button-text" fill="#7f1515">OpenRouter</text>
        <rect x="220" y="0" width="214" height="82" rx="41" fill="#ffe7bd" stroke="#d6a247" stroke-width="4"/>
        <text x="327" y="52" text-anchor="middle" class="sans button-text" fill="#7f1515">SiliconFlow</text>
        <rect x="466" y="0" width="188" height="82" rx="41" fill="#fff0d7" stroke="#ead7bd" stroke-width="2"/>
        <text x="560" y="52" text-anchor="middle" class="sans button-text" fill="#7f1515">DeepSeek</text>
      </g>

      <g transform="translate(34 272)">
        <text x="0" y="0" class="serif field-label ink">Base URL</text>
        <rect x="0" y="28" width="810" height="94" rx="24" fill="#fffaf1" stroke="#ead7bd" stroke-width="2"/>
        <text x="30" y="88" class="sans field-value ink">https://api.siliconflow.cn/v1</text>
      </g>

      <g transform="translate(34 430)">
        <text x="0" y="0" class="serif field-label ink">Model</text>
        <rect x="0" y="28" width="810" height="94" rx="24" fill="#fffaf1" stroke="#ead7bd" stroke-width="2"/>
        <text x="30" y="88" class="sans field-value ink">deepseek-ai/DeepSeek-V4-Flash</text>
      </g>

      <g transform="translate(34 588)">
        <text x="0" y="0" class="serif field-label ink">API Key</text>
        <rect x="0" y="28" width="810" height="94" rx="24" fill="#fffaf1" stroke="#ead7bd" stroke-width="2"/>
        <text x="30" y="88" class="mono field-value ink">••••••••••••••••••••••••••••••••</text>
      </g>
    </g>

    <g>
      <path d="M604 418 C650 394, 662 378, 916 378" fill="none" stroke="#9d1f1f" stroke-width="6" marker-end="url(#arrow)" opacity="0.9"/>
      <path d="M604 540 C670 540, 685 544, 738 552" fill="none" stroke="#9d1f1f" stroke-width="6" marker-end="url(#arrow)" opacity="0.9"/>
      <path d="M604 662 C675 654, 690 700, 738 710" fill="none" stroke="#9d1f1f" stroke-width="6" marker-end="url(#arrow)" opacity="0.9"/>
      <path d="M604 784 C675 805, 700 858, 738 870" fill="none" stroke="#9d1f1f" stroke-width="6" marker-end="url(#arrow)" opacity="0.9"/>
    </g>

    <g transform="translate(56 910)">
      <rect x="0" y="0" width="1526" height="54" rx="24" fill="#f7ead7" stroke="#ead7bd"/>
      <text x="28" y="36" class="sans small" fill="#9d1f1f" font-weight="900">安全提醒</text>
      <text x="150" y="36" class="sans small muted">本所 Key 仅供内部体验；不要外传、不要截图发送、不要粘贴客户敏感信息。输出仅为律师复核草稿。</text>
      <text x="1498" y="36" class="sans small green" text-anchor="end">用完可点击“清空本页数据”</text>
    </g>
  </g>
</svg>
